name: Conda packaging and deployment

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [qa, main]
    tags: ["v*"]

# cancel previous job if new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PKG_NAME: mantid-total-scattering
  MODULE_NAME: total_scattering

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          manifest-path: pyproject.toml

      - name: lint
        run: pixi run lint

      - name: Run unit tests
        run: |
          sudo apt-get install libglu1-mesa
          pixi run test

      - name: Upload coverage to codecov
        uses: codecov/codecov-action@v5
        if: github.actor != 'dependabot[bot]'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
  conda-build:
    name: Build conda package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.62.2
          manifest-path: pyproject.toml
          # Workaround: Dynamic versioning (versioningit) causes lock file version mismatch.
          # We skip the editable package install and do it separately with pip.
          # See: https://github.com/prefix-dev/pixi/pull/3092
          run-install: false

      - name: Install dependencies (skip local package)
        run: pixi install --frozen --skip ${{ env.PKG_NAME }}

      - name: Install local package
        run: pixi run pip install --no-deps -e .

      - name: Build conda package
        run: |
          pixi run build-conda
          mkdir -p /tmp/local-channel/linux-64
          cp *.conda /tmp/local-channel/linux-64

      - name: Verify conda package
        uses: neutrons/conda-actions/pkg-verify@main
        with:
          package-name: ${{ env.PKG_NAME }}
          module-name: ${{ env.MODULE_NAME }}
          local-channel: /tmp/local-channel
          python-version: 3.11
          extra-channels: conda-forge mantid neutrons

      - name: Upload conda package as artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifact-conda-package
          path: ${{ env.PKG_NAME }}-*.conda

  publish:
    name: Upload package to anaconda
    runs-on: ubuntu-latest
    needs: [test, conda-build]
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/next'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.62.2
          manifest-path: pyproject.toml
          # Workaround: Dynamic versioning (versioningit) causes lock file version mismatch.
          # We skip the editable package install and do it separately with pip.
          # See: https://github.com/prefix-dev/pixi/pull/3092
          run-install: false

      - name: Install dependencies (skip local package)
        run: pixi install --frozen --skip ${{ env.PKG_NAME }}

      - name: Download conda package artifact
        uses: actions/download-artifact@v8
        with:
          name: artifact-conda-package

      - name: Upload package to anaconda
        uses: neutrons/conda-actions/publish@main
        with:
          anaconda-token: ${{ secrets.ANACONDA_TOKEN }}
          organization: neutrons
          package-path: ${{ env.PKG_NAME }}-*.conda

      - name: Remove old packages
        if: github.ref == 'refs/heads/next'
        uses: neutrons/conda-actions/pkg-remove@v1
        with:
          anaconda_token: ${{ secrets.ANACONDA_TOKEN }}
          organization: neutrons
          package_name: ${{ env.PKG_NAME }}
          label: ${{ env.CONDA_LABEL }}
          keep: 5


  conda-build-wrapper:
    name: Build wrapper conda package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.62.2
          manifest-path: pyproject.toml
          # Workaround: Dynamic versioning (versioningit) causes lock file version mismatch.
          # We skip the editable package install and do it separately with pip.
          # See: https://github.com/prefix-dev/pixi/pull/3092
          run-install: false

      - name: setup wrapper toml
        run: pixi run 

      - name: Install dependencies (skip local package)
        run: pixi install --frozen --skip ${{ env.PKG_NAME }}

      - name: Install local package
        run: pixi run pip install --no-deps -e .

      - name: Build conda package
        run: |
          pixi run build-conda-wrapper
          mkdir -p /tmp/local-channel/linux-64
          cp *.conda /tmp/local-channel/linux-64

      - name: Verify conda package
        uses: neutrons/conda-actions/pkg-verify@main
        with:
          package-name: ${{ env.PKG_NAME }}-python-wrapper
          module-name: ${{ env.MODULE_NAME }}
          local-channel: /tmp/local-channel
          python-version: 3.11
          extra-channels: conda-forge

      - name: Upload conda package as artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifact-wrapper-conda-package
          path: ${{ env.PKG_NAME }}-python-wrapper-*.conda

  publish-wrapper:
      name: Upload wrapper package to anaconda
      runs-on: ubuntu-latest
      needs: [test, conda-build-wrapper]
      if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/next'
      steps:
        - name: Checkout
          uses: actions/checkout@v6
          with:
            fetch-depth: 0
            fetch-tags: true

        - name: Setup Pixi
          uses: prefix-dev/setup-pixi@v0.9.4
          with:
            pixi-version: v0.62.2
            manifest-path: pyproject.toml
            # Workaround: Dynamic versioning (versioningit) causes lock file version mismatch.
            # We skip the editable package install and do it separately with pip.
            # See: https://github.com/prefix-dev/pixi/pull/3092
            run-install: false

        - name: Install dependencies (skip local package)
          run: pixi install --frozen --skip ${{ env.PKG_NAME }}

        - name: Download conda package artifact
          uses: actions/download-artifact@v8
          with:
            name: artifact-wrapper-conda-package

        - name: Upload package to anaconda
          uses: neutrons/conda-actions/publish@main
          with:
            anaconda-token: ${{ secrets.ANACONDA_TOKEN }}
            organization: neutrons
            package-path: ${{ env.PKG_NAME }}-python-wrapper-*.conda

        - name: Remove old packages
          if: github.ref == 'refs/heads/next'
          uses: neutrons/conda-actions/pkg-remove@v1
          with:
            anaconda_token: ${{ secrets.ANACONDA_TOKEN }}
            organization: neutrons
            package_name: ${{ env.PKG_NAME }}-python-wrapper
            label: ${{ env.CONDA_LABEL }}
            keep: 5